# ------------------------------------------------------------------------------
# Tmux config (2.x) (3.x)
# ------------------------------------------------------------------------------
# For tmux <= tmux 3.1:
# echo 'source-file $HOME/.config/tmux/tmux.conf' > ~/.tmux.conf
# ------------------------------------------------------------------------------

# --- When tmux is not installed on a standard path
# ie. was installed using brew or when the shell doesn't read from user configs
set-environment -g PATH "/usr/local/bin:/bin:/usr/bin"

# ------------------------------------------------------------------------------
# --- Plugins
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# ------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# --- Themes
#set -g @plugin 'fabioluciano/tmux-tokyo-night'
#set -g @theme_variation 'night'

#set -g @plugin 'nordtheme/tmux'

#set -g @plugin 'dracula/tmux'

#set -g @plugin 'wfxr/tmux-power'
#set -g @tmux_power_theme 'moon'

#set -g @plugin 'egel/tmux-gruvbox'
#set -g @tmux-gruvbox 'dark256' # or 'dark256', 'light', 'light256'

# default
#set -g @plugin 'janoamaral/tokyo-night-tmux'
#set -g @tokyo-night-tmux_window_id_style digital
#set -g @tokyo-night-tmux_pane_id_style hsquare
#set -g @tokyo-night-tmux_zoom_id_style dsquare

# alternate
#set -g @plugin "https://gitlab.com/motaz-shokry/gruvbox-tmux"
#set -g @gruvbox-tmux_theme "medium"  # medium | soft | Default is hard
#set -g @gruvbox-tmux_transparent 0   # 1 | 0
#set -g @gruvbox-tmux_time_format 12H

# --- Plugin Manager
run '~/.config/tmux/plugins/tpm/tpm'

# ------------------------------------------------------------------------------
# Custom bindings placed below the run '~/.tmux/plugins/tpm/tpm
# to set their my own conflicting defaults over them.
# ------------------------------------------------------------------------------

# Set prefix to <Space> key
unbind C-b
set -g prefix2 C-Space
bind C-Space send-prefix

# --- Status bar
set -g status on
set -g status-position top
set -g status-bg colour16 # <- status bar background
set -g status-left-length 50
set -g status-justify centre
set -g status-left "#[fg=blue] [ #S ] #[fg=white]|\ #[fg=blue]• Window: #I • Pane: #P #[fg=white]| "
set -g status-fg blue
set-window-option -g window-status-separator "#[fg=black] : "
set -g status-right "#[fg=white]|\ #[fg=colour4]%a %B %d #[fg=white,bold]|\ %H:%M\ "

# Allow mouse dragging to resize panes
set-window-option -g mouse on
set-window-option -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v                  send-keys -X begin-selection
bind-key -T copy-mode-vi V                  send-keys -X select-line
bind-key -T copy-mode-vi C-v                send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape             send-keys -X cancel
# Commented since 'tmux-plugins/tmux-yank' handle this too
# bind-key -T copy-mode-vi y                  send-keys -X copy-pipe-and-cancel "pbcopy"
# bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-pipe-and-cancel "pbcopy"

# Windows and Panes numbering start with 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Colors
# Values: xterm-256color | xterm | screen-256color | screen
set -g default-terminal "screen-256color"
# Enable 256 color support
set-option -ga terminal-overrides ",*-256color:Tc"

# Improved keybindings
setw -g xterm-keys on
# Better user experience - [windows activation, status updates]
set-option -g focus-events on

# Scroll History
set -g history-limit 15000
# clear both screen and history
bind -n C-k send-keys C-l \; run 'sleep 0.1' \; clear-history
# bind l send-keys C-l \; run 'sleep 0.1' \; clear-history

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

# Set panes o be opened in cwd
unbind '"'
bind '_' split-window -v -c "#{pane_current_path}"
unbind %
bind '|' split-window -h -c "#{pane_current_path}"

# Edit config with 'Prefix + e'
bind e new-window -n "config" \
    "vim ~/.config/tmux/tmux.conf && \
     tmux source-file ~/.config/tmux/tmux.conf && \
     tmux display 'Reloaded!'"

# Reload config with 'Prefix + r'
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

